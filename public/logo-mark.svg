<svg width="160" height="160" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aredir Labs sigil">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#4b8eff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4b8eff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbe6ff"/>
      <stop offset="100%" stop-color="#9fc0ff"/>
    </linearGradient>
  </defs>

  <!-- plinth -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="#14161c"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="14.5" fill="none" stroke="#2b3140" stroke-width="1"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#glow)"/>

  <!-- hex seal -->
  <polygon points="32,7 53.5,19.5 53.5,44.5 32,57 10.5,44.5 10.5,19.5"
           fill="none" stroke="#39435c" stroke-width="1.1"/>
  <!-- runic vertex ticks -->
  <g stroke="#4b8eff" stroke-width="1.4" stroke-linecap="round" opacity="0.9">
    <line x1="32" y1="3.5" x2="32" y2="7"/>
    <line x1="56.6" y1="17.7" x2="53.5" y2="19.5"/>
    <line x1="56.6" y1="46.3" x2="53.5" y2="44.5"/>
    <line x1="32" y1="60.5" x2="32" y2="57"/>
    <line x1="7.4" y1="46.3" x2="10.5" y2="44.5"/>
    <line x1="7.4" y1="17.7" x2="10.5" y2="19.5"/>
  </g>

  <!-- A rune -->
  <g stroke="url(#stroke)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M21 47 L32 19"/>
    <path d="M32 19 L43 47"/>
    <path d="M25.5 37.5 L38.5 37.5"/>
  </g>

  <!-- ember apex star -->
  <g>
    <path d="M32 12.5 L33.4 17.6 L38.5 19 L33.4 20.4 L32 25.5 L30.6 20.4 L25.5 19 L30.6 17.6 Z"
          fill="#ffb95f"/>
    <circle cx="32" cy="19" r="1.3" fill="#fff4e0"/>
  </g>

  <!-- forge-ember feet sparks -->
  <circle cx="21" cy="47" r="1.5" fill="#ffb95f" opacity="0.85"/>
  <circle cx="43" cy="47" r="1.5" fill="#ffb95f" opacity="0.85"/>
</svg>
